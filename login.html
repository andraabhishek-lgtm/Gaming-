<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Login — Gaming Stackly</title>
  <link rel="icon" href="images/Logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #e63946;
      --red-dark: #b02132;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --bg: #0a0a0f;
      --card-bg: rgba(12, 12, 20, 0.72);
      --glass: rgba(255, 255, 255, 0.07);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f0f0f5;
      --muted: rgba(255, 255, 255, 0.5);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.13);
      --input-focus-border: rgba(230, 57, 70, 0.65);
      --input-focus-shadow: rgba(230, 57, 70, 0.15);
      --error: #ff5c6a;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Swiper background ── */
    .bg-swiper {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-swiper .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.07);
      transition: transform 9s ease;
      will-change: transform;
    }
    .bg-swiper .swiper-slide-active img {
      transform: scale(1);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(10,10,15,0.75) 0%, rgba(10,10,15,0.5) 40%, rgba(10,10,15,0.82) 100%);
    }

    /* ── Top nav bar (dashboard style) ── */
    .top-navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 62px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.25);
    }

    /* Left: square icon button */
    .nav-icon-btn {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: rgba(10, 10, 15, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 9px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .nav-icon-btn:hover {
      background: rgba(230, 57, 70, 0.25);
      box-shadow: 0 0 0 1px rgba(230, 57, 70, 0.4);
    }
    .nav-icon-btn span {
      display: block;
      width: 16px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
      transition: transform 0.2s, opacity 0.2s;
    }

    /* Center: logo + title */
    .nav-center {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      text-decoration: none;
    }
    .nav-logo-img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      padding: 3px;
    }
    .nav-title-wrap {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .nav-title {
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Right: home button */
    .nav-home-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(230, 57, 70, 0.15);
      border: 1px solid rgba(230, 57, 70, 0.35);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.03em;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      touch-action: manipulation;
    }
    .nav-home-btn:hover {
      background: rgba(230, 57, 70, 0.28);
      border-color: rgba(230, 57, 70, 0.6);
      color: #fff;
    }
    .nav-home-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Page wrapper ── */
    .page-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 88px 16px 40px;
    }

    /* ── Auth card ── */
    .auth-card {
      width: 100%;
      max-width: 430px;
      background: var(--card-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Card header ── */
    .card-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .card-header h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .card-header h1 .accent {
      background: linear-gradient(90deg, #e63946, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-header p {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.4;
    }

    /* ── Role tabs ── */
    .role-tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 24px;
    }
    .role-tab {
      flex: 1;
      border: none;
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Orbitron', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 9px 4px;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
    }
    .role-tab.active {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff;
      box-shadow: 0 2px 12px rgba(230, 57, 70, 0.4);
    }
    .role-tab:not(.active):hover {
      color: rgba(255, 255, 255, 0.75);
      background: rgba(255, 255, 255, 0.06);
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 16px;
    }
    .field-label {
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 8px;
    }
    .field-wrap {
      position: relative;
    }
    .field-input {
      width: 100%;
      padding: 13px 16px;
      font-size: 16px; /* 16px min prevents iOS zoom */
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      color: #fff;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .field-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    .field-input:focus {
      border-color: var(--input-focus-border);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 0 3px var(--input-focus-shadow);
    }
    .field-input.has-icon {
      padding-right: 48px;
    }
    .field-input.is-error {
      border-color: rgba(230, 57, 70, 0.7);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.12);
    }
    .field-error-msg {
      display: none;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--error);
      margin-top: 5px;
      padding-left: 2px;
    }
    .field-error-msg.visible {
      display: block;
    }

    /* ── Eye toggle ── */
    .eye-toggle {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      transition: color 0.2s;
      touch-action: manipulation;
    }
    .eye-toggle:hover {
      color: rgba(255, 255, 255, 0.8);
    }
    .eye-toggle svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    /* ── Remember / forgot row ── */
    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.88rem;
      font-weight: 600;
    }
    .remember-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--red);
      cursor: pointer;
      flex-shrink: 0;
    }
    .forgot-link {
      font-size: 0.86rem;
      font-weight: 600;
      color: rgba(230, 57, 70, 0.85);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link:hover {
      color: var(--red);
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      border: none;
      border-radius: 13px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.38);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.15s;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(230, 57, 70, 0.52);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(230, 57, 70, 0.3);
    }
    .btn-primary:active::after {
      background: rgba(255, 255, 255, 0.08);
    }
    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner inside button */
    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .btn-spinner { display: block; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: rgba(255, 255, 255, 0.28);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Social buttons ── */
    .social-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 22px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 8px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
      touch-action: manipulation;
    }
    .social-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
      color: #fff;
      transform: translateY(-1px);
    }
    .social-btn:active {
      transform: translateY(0);
    }
    .social-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Footer link ── */
    .card-foot {
      text-align: center;
      margin-top: 4px;
    }
    .card-foot p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .card-foot a {
      color: var(--red);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.18s;
    }
    .card-foot a:hover {
      color: #ff7a85;
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .page-wrap {
        padding: 80px 12px 32px;
        align-items: flex-start;
      }
      .auth-card {
        padding: 32px 20px 28px;
        border-radius: 20px;
        margin-top: 8px;
      }
      .site-logo-text {
        display: none;
      }
      .site-logo {
        padding: 7px 10px 7px 9px;
      }
      .social-row {
        grid-template-columns: 1fr;
      }
      .options-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }

    @media (max-width: 360px) {
      .auth-card {
        padding: 28px 16px 24px;
      }
      .card-header h1 {
        font-size: 1.3rem;
      }
      .role-tab {
        font-size: 0.65rem;
        padding: 8px 2px;
      }
    }

    @media (min-height: 900px) {
      .page-wrap {
        align-items: center;
      }
    }
  </style>
</head>
<body>

<!-- Background slideshow -->
<div class="swiper bg-swiper" aria-hidden="true">
  <div class="swiper-wrapper">
    <div class="swiper-slide"><img src="images/car-racing-01.webp" alt="" loading="eager" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/car-racing-05.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/bike-racing-01.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/car-racing-09.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/bike-racing-06.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/car-racing-13.webp" alt="" loading="lazy" decoding="async"/></div>
  </div>
</div>
<div class="bg-overlay" aria-hidden="true"></div>

<!-- Top nav bar -->
<header class="top-navbar">
  <!-- Left: hamburger / icon button -->
  <a href="index.html" class="nav-icon-btn" aria-label="Home">
    <span></span>
    <span></span>
    <span></span>
  </a>

  <!-- Center: logo + title -->
  <a href="index.html" class="nav-center" aria-label="Gaming Stackly">
    <img src="images/Logo.png" alt="" class="nav-logo-img"/>
    <div class="nav-title-wrap">
      <span class="nav-title">Gaming Stackly</span>
      <span class="nav-subtitle">Player Login</span>
    </div>
  </a>

  <!-- Right: home link -->
  <a href="index.html" class="nav-home-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <polyline points="9 21 9 12 15 12 15 21"/>
    </svg>
    Home
  </a>
</header>

<!-- Main card -->
<div class="page-wrap">
  <div class="auth-card" role="main">

    <div class="card-header">
      <h1>Welcome <span class="accent">Back</span></h1>
      <p>Sign in to your Gaming Stackly account</p>
    </div>

    <!-- Role selector -->
    <div class="role-tabs" role="tablist" aria-label="Account type">
      <button class="role-tab active" role="tab" aria-selected="true" data-role="player">Player</button>
      <button class="role-tab" role="tab" aria-selected="false" data-role="team">Team</button>
      <button class="role-tab" role="tab" aria-selected="false" data-role="admin">Admin</button>
    </div>

    <form id="loginForm" novalidate autocomplete="on">

      <!-- Email -->
      <div class="field">
        <label class="field-label" for="loginEmail">Email Address</label>
        <div class="field-wrap">
          <input
            class="field-input"
            type="email"
            id="loginEmail"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            inputmode="email"
            required
          />
        </div>
        <span class="field-error-msg" id="emailErr" role="alert">Please enter a valid email address.</span>
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field-label" for="loginPassword">Password</label>
        <div class="field-wrap">
          <input
            class="field-input has-icon"
            type="password"
            id="loginPassword"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
          <button type="button" class="eye-toggle" id="eyeToggle" aria-label="Show password">
            <!-- eye-open icon -->
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error-msg" id="passwordErr" role="alert">Password cannot be empty.</span>
      </div>

      <!-- Options row -->
      <div class="options-row">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe" name="remember"/>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary" id="loginBtn">
        <span class="btn-label">Enter the Arena</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>

    </form>

    <div class="divider">or continue with</div>

    <div class="social-row">
      <a href="#" class="social-btn" aria-label="Continue with Google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </a>
      <a href="#" class="social-btn" aria-label="Continue with Discord">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/>

      <p>New to the arena? <a href="signup.html">Create account</a></p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
(function () {
  'use strict';

  /* ── Swiper background ── */
  new Swiper('.bg-swiper', {
    effect: 'fade',
    fadeEffect: { crossFade: true },
    autoplay: { delay: 5000, disableOnInteraction: false },
    speed: 1400,
    loop: true,
    allowTouchMove: false,
    preloadImages: false,
    lazy: { loadPrevNext: true },
  });

  /* ── Role tabs ── */
  const roleTabs = document.querySelectorAll('.role-tab');
  roleTabs.forEach(function (tab) {
    tab.addEventListener('click', function () {
      roleTabs.forEach(function (t) {
        t.classList.remove('active');
        t.setAttribute('aria-selected', 'false');
      });
      tab.classList.add('active');
      tab.setAttribute('aria-selected', 'true');
    });
  });

  /* ── Password eye toggle ── */
  var pwInput  = document.getElementById('loginPassword');
  var eyeBtn   = document.getElementById('eyeToggle');
  var eyeIcon  = document.getElementById('eyeIcon');

  var EYE_OPEN   = '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  var EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

  eyeBtn.addEventListener('click', function () {
    var showing = pwInput.type === 'text';
    pwInput.type = showing ? 'password' : 'text';
    eyeIcon.innerHTML = showing ? EYE_OPEN : EYE_CLOSED;
    eyeBtn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
  });

  /* ── Validation helpers ── */
  function showError(inputEl, errId, msg) {
    inputEl.classList.add('is-error');
    var el = document.getElementById(errId);
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearError(inputEl, errId) {
    inputEl.classList.remove('is-error');
    document.getElementById(errId).classList.remove('visible');
  }

  function isValidEmail(val) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(val.trim());
  }

  /* Live clear errors as user types */
  var emailInput = document.getElementById('loginEmail');
  emailInput.addEventListener('input', function () {
    if (emailInput.classList.contains('is-error') && isValidEmail(emailInput.value)) {
      clearError(emailInput, 'emailErr');
    }
  });
  pwInput.addEventListener('input', function () {
    if (pwInput.classList.contains('is-error') && pwInput.value.length > 0) {
      clearError(pwInput, 'passwordErr');
    }
  });

  /* ── Form submit ── */
  var form    = document.getElementById('loginForm');
  var loginBtn = document.getElementById('loginBtn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    var emailVal = emailInput.value.trim();
    var pwVal    = pwInput.value;
    var ok       = true;

    clearError(emailInput, 'emailErr');
    clearError(pwInput, 'passwordErr');

    if (!emailVal) {
      showError(emailInput, 'emailErr', 'Email address is required.');
      ok = false;
    } else if (!isValidEmail(emailVal)) {
      showError(emailInput, 'emailErr', 'Please enter a valid email address.');
      ok = false;
    }

    if (!pwVal) {
      showError(pwInput, 'passwordErr', 'Password cannot be empty.');
      ok = false;
    }

    if (!ok) {
      /* Shake the card on error */
      var card = document.querySelector('.auth-card');
      card.style.animation = 'none';
      card.offsetHeight; /* reflow */
      card.style.animation = 'shake 0.35s ease';
      return;
    }

    /* Show loading state */
    loginBtn.classList.add('loading');
    loginBtn.disabled = true;

    /* Redirect to role-specific dashboard */
    var activeRole = document.querySelector('.role-tab.active').getAttribute('data-role');
    var emailName = emailVal.split('@')[0]
      .replace(/[._-]+/g, ' ')
      .replace(/[^a-zA-Z0-9 ]/g, '')
      .trim();
    var displayName = emailName || 'Player';
    displayName = displayName.replace(/\b\w/g, function (char) { return char.toUpperCase(); });

    localStorage.setItem('gamingStacklyEmail', emailVal);
    localStorage.setItem('gamingStacklyRole', activeRole);
    localStorage.setItem('gamingStacklyName', displayName);

    var dashboardMap = {
      player: 'player-dashboard.html',
      team:   'team-dashboard.html',
      admin:  'admin-dashboard.html'
    };
    setTimeout(function () {
      window.location.href = dashboardMap[activeRole] || 'player-dashboard.html';
    }, 900);
  });

  /* Shake animation added via JS */
  var style = document.createElement('style');
  style.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}';
  document.head.appendChild(style);

})();
</script>
</body>
</html>
