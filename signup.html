<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Sign Up — Gaming Stackly</title>
  <link rel="icon" href="images/Logo.png" type="image/png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red: #e63946;
      --red-dark: #b02132;
      --purple: #a855f7;
      --cyan: #06b6d4;
      --bg: #0a0a0f;
      --card-bg: rgba(12, 12, 20, 0.72);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f0f0f5;
      --muted: rgba(255, 255, 255, 0.5);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.13);
      --input-focus-border: rgba(230, 57, 70, 0.65);
      --input-focus-shadow: rgba(230, 57, 70, 0.15);
      --error: #ff5c6a;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Swiper background ── */
    .bg-swiper {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .bg-swiper .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scale(1.07);
      transition: transform 9s ease;
      will-change: transform;
    }
    .bg-swiper .swiper-slide-active img {
      transform: scale(1);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(10,10,15,0.8) 0%, rgba(10,10,15,0.55) 40%, rgba(10,10,15,0.85) 100%);
    }

    /* ── Top nav bar (dashboard style) ── */
    .top-navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      height: 62px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 20px;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 2px 24px rgba(0, 0, 0, 0.25);
    }
    .nav-icon-btn {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      background: rgba(10, 10, 15, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 9px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .nav-icon-btn:hover {
      background: rgba(230, 57, 70, 0.25);
      box-shadow: 0 0 0 1px rgba(230, 57, 70, 0.4);
    }
    .nav-icon-btn span {
      display: block;
      width: 16px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
    }
    .nav-center {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      text-decoration: none;
    }
    .nav-logo-img {
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      padding: 3px;
    }
    .nav-title-wrap {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .nav-title {
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .nav-home-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(230, 57, 70, 0.15);
      border: 1px solid rgba(230, 57, 70, 0.35);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.03em;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      touch-action: manipulation;
    }
    .nav-home-btn:hover {
      background: rgba(230, 57, 70, 0.28);
      border-color: rgba(230, 57, 70, 0.6);
      color: #fff;
    }
    .nav-home-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── Page wrapper ── */
    .page-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 88px 16px 48px;
    }

    /* ── Auth card ── */
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--card-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 36px 36px 32px;
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset;
      animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.84rem;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 24px;
      transition: color 0.18s;
    }
    .back-link:hover {
      color: rgba(255, 255, 255, 0.85);
    }
    .back-link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Card header ── */
    .card-header {
      text-align: center;
      margin-bottom: 26px;
    }
    .card-header h1 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(1.35rem, 4vw, 1.7rem);
      color: #fff;
      letter-spacing: 0.03em;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .card-header h1 .accent {
      background: linear-gradient(90deg, #e63946, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-header p {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* ── Two-col grid ── */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── Form fields ── */
    .field {
      margin-bottom: 14px;
    }
    .field-label {
      display: block;
      font-family: 'Orbitron', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
      margin-bottom: 7px;
    }
    .field-wrap {
      position: relative;
    }
    .field-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 500;
      color: #fff;
      background: var(--input-bg);
      border: 1.5px solid var(--input-border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .field-input::placeholder {
      color: rgba(255, 255, 255, 0.28);
    }
    .field-input:focus {
      border-color: var(--input-focus-border);
      background: rgba(255, 255, 255, 0.09);
      box-shadow: 0 0 0 3px var(--input-focus-shadow);
    }
    .field-input.has-icon {
      padding-right: 48px;
    }
    .field-input.is-error {
      border-color: rgba(230, 57, 70, 0.7);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.12);
    }
    .field-error-msg {
      display: none;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--error);
      margin-top: 4px;
      padding-left: 2px;
    }
    .field-error-msg.visible {
      display: block;
    }

    /* ── Eye toggle ── */
    .eye-toggle {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
      transition: color 0.2s;
      touch-action: manipulation;
    }
    .eye-toggle:hover {
      color: rgba(255, 255, 255, 0.8);
    }
    .eye-toggle svg {
      width: 18px;
      height: 18px;
      pointer-events: none;
    }

    /* ── Password strength ── */
    .strength-wrap {
      margin-top: 8px;
    }
    .strength-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.09);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 5px;
    }
    .strength-fill {
      height: 100%;
      width: 0;
      border-radius: 4px;
      transition: width 0.3s ease, background-color 0.3s ease;
    }
    .strength-text {
      font-size: 0.74rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.3s;
    }

    /* ── Terms row ── */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      margin-top: 4px;
    }
    .terms-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      min-width: 16px;
      accent-color: var(--red);
      cursor: pointer;
      margin-top: 3px;
    }
    .terms-row label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.86rem;
      font-weight: 600;
      line-height: 1.45;
      cursor: pointer;
    }
    .terms-row a {
      color: var(--red);
      text-decoration: none;
    }
    .terms-row a:hover {
      text-decoration: underline;
    }
    .terms-error {
      display: none;
      font-size: 0.76rem;
      font-weight: 600;
      color: var(--error);
      margin-top: -14px;
      margin-bottom: 16px;
    }
    .terms-error.visible {
      display: block;
    }

    /* ── Primary button ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
      border: none;
      border-radius: 13px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-weight: 700;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(230, 57, 70, 0.38);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(230, 57, 70, 0.52);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .btn-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-primary.loading .btn-label { display: none; }
    .btn-primary.loading .btn-spinner { display: block; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: rgba(255, 255, 255, 0.28);
      font-size: 0.78rem;
      font-weight: 600;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Social buttons ── */
    .social-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 8px;
      border-radius: 11px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.18s;
      touch-action: manipulation;
    }
    .social-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
      color: #fff;
      transform: translateY(-1px);
    }
    .social-btn:active { transform: translateY(0); }
    .social-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Footer ── */
    .card-foot {
      text-align: center;
    }
    .card-foot p {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .card-foot a {
      color: var(--red);
      text-decoration: none;
      font-weight: 700;
      transition: color 0.18s;
    }
    .card-foot a:hover {
      color: #ff7a85;
      text-decoration: underline;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .page-wrap {
        padding: 80px 12px 40px;
      }
      .auth-card {
        padding: 28px 18px 24px;
        border-radius: 20px;
      }
      .field-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .site-logo-text {
        display: none;
      }
      .site-logo {
        padding: 7px 10px 7px 9px;
      }
      .social-row {
        grid-template-columns: 1fr;
      }
      .card-header {
        margin-bottom: 20px;
      }
    }

    @media (max-width: 360px) {
      .auth-card {
        padding: 24px 14px 20px;
      }
    }
  </style>
  <link rel="stylesheet" href="css/responsive-fix.css">
</head>
<body>

<!-- Background slideshow -->
<div class="swiper bg-swiper" aria-hidden="true">
  <div class="swiper-wrapper">
    <div class="swiper-slide"><img src="images/car-racing-02.webp" alt="" loading="eager" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/bike-racing-03.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/car-racing-07.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/bike-racing-08.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/car-racing-11.webp" alt="" loading="lazy" decoding="async"/></div>
    <div class="swiper-slide"><img src="images/bike-racing-12.webp" alt="" loading="lazy" decoding="async"/></div>
  </div>
</div>
<div class="bg-overlay" aria-hidden="true"></div>

<!-- Top nav bar -->
<header class="top-navbar">
  <a href="index.html" class="nav-icon-btn" aria-label="Home">
    <span></span>
    <span></span>
    <span></span>
  </a>
  <a href="index.html" class="nav-center" aria-label="Gaming Stackly">
    <img src="images/Logo.png" alt="" class="nav-logo-img"/>
    <div class="nav-title-wrap">
      <span class="nav-title">Gaming Stackly</span>
      <span class="nav-subtitle">Create Account</span>
    </div>
  </a>
  <a href="index.html" class="nav-home-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
      <polyline points="9 21 9 12 15 12 15 21"/>
    </svg>
    Home
  </a>
</header>

<!-- Main card -->
<div class="page-wrap">
  <div class="auth-card" role="main">

    <a href="login.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Back to Login
    </a>

    <div class="card-header">
      <h1>Join the <span class="accent">Arena</span></h1>
      <p>Create your Gaming Stackly account</p>
    </div>

    <form id="signupForm" novalidate autocomplete="on">

      <!-- First + Last name -->
      <div class="field-row">
        <div class="field">
          <label class="field-label" for="firstName">First Name</label>
          <div class="field-wrap">
            <input class="field-input" type="text" id="firstName" name="firstName"
              placeholder="Alex" autocomplete="given-name" required/>
          </div>
          <span class="field-error-msg" id="firstNameErr" role="alert"></span>
        </div>
        <div class="field">
          <label class="field-label" for="lastName">Last Name</label>
          <div class="field-wrap">
            <input class="field-input" type="text" id="lastName" name="lastName"
              placeholder="Storm" autocomplete="family-name" required/>
          </div>
          <span class="field-error-msg" id="lastNameErr" role="alert"></span>
        </div>
      </div>

      <!-- Gamer tag -->
      <div class="field">
        <label class="field-label" for="gamerTag">Gamer Tag</label>
        <div class="field-wrap">
          <input class="field-input" type="text" id="gamerTag" name="gamerTag"
            placeholder="xX_Racer_Xx" autocomplete="username" required/>
        </div>
        <span class="field-error-msg" id="gamerTagErr" role="alert"></span>
      </div>

      <!-- Email -->
      <div class="field">
        <label class="field-label" for="signupEmail">Email Address</label>
        <div class="field-wrap">
          <input class="field-input" type="email" id="signupEmail" name="email"
            placeholder="your@email.com" autocomplete="email" inputmode="email" required/>
        </div>
        <span class="field-error-msg" id="emailErr" role="alert"></span>
      </div>

      <!-- Password -->
      <div class="field">
        <label class="field-label" for="signupPassword">Password</label>
        <div class="field-wrap">
          <input class="field-input has-icon" type="password" id="signupPassword" name="password"
            placeholder="Create a strong password" autocomplete="new-password" required/>
          <button type="button" class="eye-toggle" id="eyeBtn1" aria-label="Show password">
            <svg id="eyeIcon1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <!-- Strength bar -->
        <div class="strength-wrap">
          <div class="strength-track">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-text" id="strengthText"></span>
        </div>
        <span class="field-error-msg" id="passwordErr" role="alert"></span>
      </div>

      <!-- Confirm password -->
      <div class="field">
        <label class="field-label" for="confirmPwd">Confirm Password</label>
        <div class="field-wrap">
          <input class="field-input has-icon" type="password" id="confirmPwd" name="confirmPassword"
            placeholder="Repeat your password" autocomplete="new-password" required/>
          <button type="button" class="eye-toggle" id="eyeBtn2" aria-label="Show confirm password">
            <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error-msg" id="confirmErr" role="alert"></span>
      </div>

      <!-- Terms -->
      <div class="terms-row">
        <input type="checkbox" id="agreeTerms" name="terms"/>
        <label for="agreeTerms">
          I agree to the <a href="404.html">Terms of Service</a> and <a href="404.html">Privacy Policy</a>
        </label>
      </div>
      <span class="terms-error" id="termsErr" role="alert">You must accept the terms to continue.</span>

      <!-- Submit -->
      <button type="submit" class="btn-primary" id="signupBtn">
        <span class="btn-label">Create Account</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>

    </form>

    <div class="divider">or sign up with</div>

    <div class="social-row">
      <a href="404.html" class="social-btn" aria-label="Sign up with Google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>

          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

      <a href="404.html" class="social-btn" aria-label="Sign up with Discord">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
(function () {
  'use strict';

  /* ── Swiper background ── */
  new Swiper('.bg-swiper', {
    effect: 'fade',
    fadeEffect: { crossFade: true },
    autoplay: { delay: 5000, disableOnInteraction: false },
    speed: 1400,
    loop: true,
    allowTouchMove: false,
    preloadImages: false,
    lazy: { loadPrevNext: true },
  });

  /* ── Eye toggle factory ── */
  var EYE_OPEN   = '<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>';
  var EYE_CLOSED = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';

  function makeEyeToggle(btnId, iconId, inputId) {
    var btn   = document.getElementById(btnId);
    var icon  = document.getElementById(iconId);
    var input = document.getElementById(inputId);
    if (!btn || !icon || !input) return;
    btn.addEventListener('click', function () {
      var visible = input.type === 'text';
      input.type = visible ? 'password' : 'text';
      icon.innerHTML = visible ? EYE_OPEN : EYE_CLOSED;
      btn.setAttribute('aria-label', visible ? 'Show password' : 'Hide password');
    });
  }

  makeEyeToggle('eyeBtn1', 'eyeIcon1', 'signupPassword');
  makeEyeToggle('eyeBtn2', 'eyeIcon2', 'confirmPwd');

  /* ── Password strength ── */
  var STRENGTH = [
    { pct: '0',   color: 'transparent', label: '' },
    { pct: '25%', color: '#e63946',     label: 'Weak' },
    { pct: '50%', color: '#f97316',     label: 'Fair' },
    { pct: '75%', color: '#eab308',     label: 'Good' },
    { pct: '100%',color: '#22c55e',     label: 'Strong' },
  ];

  function calcStrength(val) {
    var s = 0;
    if (val.length >= 8)           s++;
    if (/[A-Z]/.test(val))         s++;
    if (/[0-9]/.test(val))         s++;
    if (/[^A-Za-z0-9]/.test(val)) s++;
    return s;
  }

  var pwInput   = document.getElementById('signupPassword');
  var fillEl    = document.getElementById('strengthFill');
  var labelEl   = document.getElementById('strengthText');

  pwInput.addEventListener('input', function () {
    var score = pwInput.value.length === 0 ? 0 : calcStrength(pwInput.value);
    var lvl   = STRENGTH[score];
    fillEl.style.width           = lvl.pct;
    fillEl.style.backgroundColor = lvl.color;
    labelEl.textContent          = lvl.label;
    labelEl.style.color          = lvl.color;

    if (pwInput.classList.contains('is-error') && score >= 2) {
      clearErr(pwInput, 'passwordErr');
    }
  });

  /* ── Validation helpers ── */
  function showErr(inputEl, errId, msg) {
    inputEl.classList.add('is-error');
    var el = document.getElementById(errId);
    if (el) { el.textContent = msg; el.classList.add('visible'); }
  }
  function clearErr(inputEl, errId) {
    inputEl.classList.remove('is-error');
    var el = document.getElementById(errId);
    if (el) el.classList.remove('visible');
  }
  function isValidEmail(v) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v.trim());
  }

  /* Live validation on blur */
  var fields = [
    { id: 'firstName',     errId: 'firstNameErr', check: function(v){ return !v.trim() ? 'First name is required.' : !/^[A-Za-z\s\-']+$/.test(v.trim()) ? 'First name must contain only letters.' : ''; } },
    { id: 'lastName',      errId: 'lastNameErr',  check: function(v){ return !v.trim() ? 'Last name is required.' : !/^[A-Za-z\s\-']+$/.test(v.trim()) ? 'Last name must contain only letters.' : ''; } },
    { id: 'gamerTag',      errId: 'gamerTagErr',  check: function(v){ return v.trim() ? '' : 'Choose a gamer tag.'; } },
    { id: 'signupEmail',   errId: 'emailErr',     check: function(v){ return isValidEmail(v) ? '' : 'Enter a valid email address.'; } },
    { id: 'confirmPwd',    errId: 'confirmErr',   check: function(v){ return v === pwInput.value ? '' : "Passwords don't match."; } },
  ];

  fields.forEach(function (f) {
    var el = document.getElementById(f.id);
    if (!el) return;
    el.addEventListener('blur', function () {
      var msg = f.check(el.value);
      if (msg) showErr(el, f.errId, msg);
      else clearErr(el, f.errId);
    });
    el.addEventListener('input', function () {
      if (el.classList.contains('is-error')) {
        var msg = f.check(el.value);
        if (!msg) clearErr(el, f.errId);
      }
    });
  });

  /* ── Form submit ── */
  var form      = document.getElementById('signupForm');
  var submitBtn = document.getElementById('signupBtn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    var firstName   = document.getElementById('firstName');
    var lastName    = document.getElementById('lastName');
    var gamerTag    = document.getElementById('gamerTag');
    var emailInput  = document.getElementById('signupEmail');
    var confirmEl   = document.getElementById('confirmPwd');
    var termsCheck  = document.getElementById('agreeTerms');
    var termsErrEl  = document.getElementById('termsErr');
    var ok          = true;

    /* Clear all */
    [firstName, lastName, gamerTag, emailInput, pwInput, confirmEl].forEach(function (el) {
      el.classList.remove('is-error');
    });
    document.querySelectorAll('.field-error-msg').forEach(function (el) {
      el.classList.remove('visible');
    });
    termsErrEl.classList.remove('visible');

    /* Validate each */
    if (!firstName.value.trim()) {
      showErr(firstName, 'firstNameErr', 'First name is required.'); ok = false;
    } else if (!/^[A-Za-z\s\-']+$/.test(firstName.value.trim())) {
      showErr(firstName, 'firstNameErr', 'First name must contain only letters.'); ok = false;
    }
    if (!lastName.value.trim()) {
      showErr(lastName, 'lastNameErr', 'Last name is required.'); ok = false;
    } else if (!/^[A-Za-z\s\-']+$/.test(lastName.value.trim())) {
      showErr(lastName, 'lastNameErr', 'Last name must contain only letters.'); ok = false;
    }
    if (!gamerTag.value.trim()) {
      showErr(gamerTag, 'gamerTagErr', 'Choose a gamer tag.'); ok = false;
    }
    if (!isValidEmail(emailInput.value)) {
      showErr(emailInput, 'emailErr', 'Enter a valid email address.'); ok = false;
    }
    if (calcStrength(pwInput.value) < 2) {
      showErr(pwInput, 'passwordErr', 'Password too weak — 8+ chars, uppercase, number, or symbol.'); ok = false;
    }
    if (confirmEl.value !== pwInput.value) {
      showErr(confirmEl, 'confirmErr', "Passwords don't match."); ok = false;
    }
    if (!termsCheck.checked) {
      termsErrEl.classList.add('visible'); ok = false;
    }

    if (!ok) {
      /* Scroll to first error */
      var firstErr = form.querySelector('.is-error');
      if (firstErr) firstErr.focus({ preventScroll: false });
      return;
    }

    /* Loading state */
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    /* Replace with real auth */
    setTimeout(function () {
      window.location.href = 'login.html';
    }, 1100);
  });

})();
</script>
</body>
